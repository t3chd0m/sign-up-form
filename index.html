<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Font -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <!-- Sidebar: Just the background image -->
        <section class="sidebar"></section>

        <!-- Content Area -->
        <section class="content">
            <div class="header-text">
                <p>This is not a real service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
                <p>You <em>know</em> you want to.</p>
            </div>

            <div class="form-container">
                <form action="#" method="post" id="signup-form">
                    <h2>Let's do this!</h2>
                    
                    <div class="form-row">
                        <div class="input-group">
                            <label for="first_name">FIRST NAME</label>
                            <input type="text" id="first_name" name="first_name" required>
                        </div>
                        <div class="input-group">
                            <label for="last_name">LAST NAME</label>
                            <input type="text" id="last_name" name="last_name" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="user_email">EMAIL</label>
                            <input type="email" id="user_email" name="user_email" required>
                        </div>
                        <div class="input-group">
                            <label for="phone_number">PHONE NUMBER</label>
                            <input type="tel" id="phone_number" name="phone_number">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="user_password">PASSWORD</label>
                            <input type="password" id="user_password" name="user_password" required>
                        </div>
                        <div class="input-group">
                            <label for="confirm_password">CONFIRM PASSWORD</label>
                            <input type="password" id="confirm_password" name="confirm_password" required>
                        </div>
                    </div>
                </form>
            </div>

            <div class="footer-area">
                <button type="submit" form="signup-form">Create Account</button>
                <p>Already have an account? <a href="#">Log in</a></p>
            </div>
        </section>
    </div>

</body>
</html>
