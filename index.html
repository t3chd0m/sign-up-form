<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <!-- This links your CSS file -->
    <link rel="stylesheet" href="style.css">
    <!-- Optional: Add a Google Font link here -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <!-- Your sidebar and form content goes here -->
        <section class="sidebar"></section>

        <section class="content">
            <section class="content">
    <!-- 1. Header Text -->
    <div class="header-text">
        <p>This is not a real service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
        <p>You <em>know</em> you want to.</p>
    </div>

    <!-- 2. The Form -->
    <div class="form-container">
        <form action="#" method="post" id="signup-form">
    <h2>Let's do this!</h2>
    
    <!-- Row 1 -->
    <div class="form-row">
        <div class="input-group">
            <label for="first_name">FIRST NAME</label>
            <input type="text" id="first_name" name="first_name" required>
        </div>
        <div class="input-group">
            <label for="last_name">LAST NAME</label>
            <input type="text" id="last_name" name="last_name" required>
        </div>
    </div>

    <!-- Row 2 -->
    <div class="form-row">
        <div class="input-group">
            <label for="user_email">EMAIL</label>
            <input type="email" id="user_email" name="user_email" required>
        </div>
        <div class="input-group">
            <label for="phone_number">PHONE NUMBER</label>
            <input type="tel" id="phone_number" name="phone_number">
        </div>
    </div>

    <!-- Row 3 -->
    <div class="form-row">
        <div class="input-group">
            <label for="user_password">PASSWORD</label>
            <input type="password" id="user_password" name="user_password" required>
        </div>
        <div class="input-group">
            <label for="confirm_password">CONFIRM PASSWORD</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
    </div>
</form>

    </div>

    <!-- 3. The Footer -->
    <div class="footer-text">
        <button type="submit" form="signup-form">Create Account</button>
        <p>Already have an account? <a href="#">Log in</a></p>
    </div>
</section>

        </section>
    </div>

</body>
</html>
